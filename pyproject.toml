[project]
name = "klovis-agent"
version = "0.1.0"
description = "Composable Python library for building goal-oriented autonomous agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "structlog>=24.0.0",
    "python-ulid>=2.0.0",
    "python-dotenv>=1.0.0",
    "langgraph>=0.2.0",
    "httpx>=0.27.0",
    "aiofiles>=24.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["klovis_agent"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
